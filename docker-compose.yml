# =============================================================================
# Salesianos FC Web - Docker Compose
# =============================================================================
# Uso: desde frontend/ ejecutar `docker compose up -d`
# Variables de build: VITE_API_BASE (URL del API) y opcionalmente VITE_MAPBOX_TOKEN.
# =============================================================================

name: salesianos-web

services:
  salesianos-web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: ${VITE_API_BASE:-http://localhost:8000}
        VITE_MAPBOX_TOKEN: ${VITE_MAPBOX_TOKEN:-}
    container_name: salesianos-web
    restart: unless-stopped
    ports:
      - "8080:80"
    networks:
      - salesianos-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  salesianos-network:
    driver: bridge
